name: Feature request
about: Propose a focused user-visible improvement
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user problem, not only the proposed implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Beginner onboarding
        - Sessions and project navigation
        - Permissions and safety
        - Models, modes, or quota display
        - Accessibility
        - Packaging or installation
        - Developer tooling
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety impact
      options:
        - label: This may affect authentication, permissions, local files, network access, or stored data.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Taipei
    # 2026-07-19: auto-PRs disabled (owner decision) — majors need a dedicated,
    # verified upgrade round; security advisories still surface via GitHub alerts.
    open-pull-requests-limit: 0
    labels:
      - dependencies
    commit-message:
      prefix: chore

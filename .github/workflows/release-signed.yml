name: Signed release

# Builds a release candidate and has SignPath (Foundation OSS certificate) sign
# it, then proves the signature before anything is published.
#
# Safety contract (roadmap issue #1):
#   - Signing secrets missing  -> the job FAILS. It never publishes an artifact
#     that is described as signed but is not.
#   - Signature not Valid      -> the job FAILS (scripts/verify-signature.mjs --required).
#   - SHA-256 stays an independent check alongside the signature.
#
# Required repository configuration (added once the SignPath application is
# approved; until then this workflow is expected to fail fast when dispatched):
#   secrets.SIGNPATH_API_TOKEN
#   vars.SIGNPATH_ORGANIZATION_ID
#   vars.SIGNPATH_PROJECT_SLUG
#   vars.SIGNPATH_SIGNING_POLICY_SLUG   (e.g. release-signing)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and sign (e.g. v0.11.0)
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build release candidate
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Fail fast when signing is not configured
        shell: bash
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
        run: |
          missing=""
          [ -n "$SIGNPATH_API_TOKEN" ] || missing="$missing SIGNPATH_API_TOKEN(secret)"
          [ -n "$SIGNPATH_ORGANIZATION_ID" ] || missing="$missing SIGNPATH_ORGANIZATION_ID(var)"
          [ -n "$SIGNPATH_PROJECT_SLUG" ] || missing="$missing SIGNPATH_PROJECT_SLUG(var)"
          [ -n "$SIGNPATH_SIGNING_POLICY_SLUG" ] || missing="$missing SIGNPATH_SIGNING_POLICY_SLUG(var)"
          if [ -n "$missing" ]; then
            echo "::error::Signed release requested but signing is not configured. Missing:$missing"
            echo "Until the SignPath Foundation application is approved, publish through the documented unsigned community path instead — do not describe that output as signed."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Verify source
        run: npm run verify

      - name: Build unsigned NSIS installer
        run: npm run package

      - name: Upload unsigned candidate
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          if-no-files-found: error
          path: outputs/installer/Grok-Build-Control-Center-Setup-*.exe

  sign:
    name: Sign via SignPath
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Submit signing request
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-name: unsigned-installer
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed installer
        uses: actions/upload-artifact@v4
        with:
          name: signed-installer
          if-no-files-found: error
          path: signed/**

  verify-and-publish:
    name: Verify signature and publish
    needs: sign
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: signed-installer
          path: signed

      - name: Prove the signature before publishing
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Recurse -Filter 'Grok-Build-Control-Center-Setup-*.exe' signed | Select-Object -First 1
          if (-not $installer) { throw 'No signed installer found in the SignPath output.' }
          node scripts/verify-signature.mjs $installer.FullName --required
          "SIGNED_INSTALLER=$($installer.FullName)" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Recreate release evidence for the signed artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force outputs/release | Out-Null
          npm sbom --sbom-format cyclonedx | Out-File -Encoding utf8 outputs/release/sbom.cdx.json
          $installer = Get-Item $env:SIGNED_INSTALLER
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName
          "$($hash.Hash.ToLower())  $($installer.Name)" | Out-File -Encoding ascii outputs/release/SHA256SUMS.txt
          Get-Content outputs/release/SHA256SUMS.txt

      - name: Attach signed artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ inputs.tag }} "$env:SIGNED_INSTALLER" outputs/release/SHA256SUMS.txt outputs/release/sbom.cdx.json --clobber
        shell: pwsh

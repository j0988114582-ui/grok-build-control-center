name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Test, lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify
        run: npm run verify

  windows-ui-smoke:
    name: Windows Electron UI smoke
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build and run UI smoke test
        run: npm run smoke:ui
      - name: Upload UI smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-${{ github.run_id }}
          path: outputs/ui-smoke/
          if-no-files-found: warn
          retention-days: 14
